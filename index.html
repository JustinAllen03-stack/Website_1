<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website_1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Hello, world!</h1>
  <p>This is the start of my website.</p>

  <section id="reading-list">
    <h2>Currently Reading</h2>

    <form id="add-book-form">
      <input type="text" id="book-title" placeholder="Book title" required>
      <input type="number" id="book-current" placeholder="Current page" min="0" required>
      <input type="number" id="book-total" placeholder="Total pages" min="1" required>
      <button type="submit">Add Book</button>
    </form>

    <div id="book-list"></div>
  </section>

  <script type="module" src="reading-list.js"></script>
</body>
</html>
